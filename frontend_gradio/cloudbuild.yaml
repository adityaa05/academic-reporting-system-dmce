steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gradio-frontend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gradio-frontend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gradio-frontend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gradio-frontend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gradio-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gradio-frontend:$SHORT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '7860'

images:
  - 'gcr.io/$PROJECT_ID/gradio-frontend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/gradio-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
